<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorWin — Color Prediction</title>
<link rel="stylesheet" href="style.css">
<style>
  body { background:var(--bg); padding-bottom:20px; }
  .game-header { background:#fff; border-bottom:1px solid var(--border); padding:12px 16px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:100; box-shadow:0 1px 4px rgba(0,0,0,.06); }
  .back-btn    { width:34px; height:34px; border-radius:8px; background:var(--bg); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:16px; }
  .ghead-title { font-size:15px; font-weight:700; }
  .ghead-bal   { margin-left:auto; font-size:13px; font-weight:700; color:var(--orange); }
  .period-bar  { background:#fff; border-bottom:1px solid var(--border); padding:10px 16px; display:flex; justify-content:space-between; align-items:center; }
  .plabel { font-size:10px; color:var(--muted); font-weight:600; text-transform:uppercase; }
  .pvalue { font-size:12px; font-weight:600; }
  .timer-display { font-size:26px; font-weight:800; color:var(--orange); letter-spacing:2px; line-height:1; text-align:right; }
  .timer-display.urgent { color:var(--red); animation:blink .5s infinite alternate; }
  @keyframes blink { from{opacity:1} to{opacity:.5} }
  .tlabel { font-size:9px; color:var(--muted); text-align:right; }
  .bet-section { background:#fff; margin:12px; border-radius:12px; padding:14px; border:1px solid var(--border); }
  .shead { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:10px; }
  .color-buttons { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:14px; }
  .color-btn { border:none; border-radius:9px; padding:14px 6px; font-family:'Poppins',sans-serif; font-size:12px; font-weight:700; cursor:pointer; transition:all .15s; }
  .color-btn:active { transform:scale(.95); }
  .btn-red    { background:#d32f2f; color:#fff; }
  .btn-violet { background:#7b1fa2; color:#fff; }
  .btn-green2 { background:var(--green); color:#fff; }
  .cmult { font-size:10px; opacity:.75; display:block; margin-top:2px; }
  .bigsmall-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px; }
  .bs-btn { border:none; border-radius:9px; padding:14px; font-family:'Poppins',sans-serif; font-size:13px; font-weight:700; cursor:pointer; transition:all .15s; display:flex; flex-direction:column; align-items:center; gap:2px; }
  .bs-btn:active { transform:scale(.95); }
  .btn-big   { background:#e65100; color:#fff; }
  .btn-small { background:#1565c0; color:#fff; }
  .bs-sub    { font-size:10px; opacity:.7; }
  .number-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:7px; }
  .num-btn { aspect-ratio:1; border-radius:8px; font-size:16px; font-weight:700; cursor:pointer; font-family:'Poppins',sans-serif; transition:all .15s; border:none; }
  .num-btn:active { transform:scale(.88); }
  .num-0,.num-5 { background:#7b1fa2; color:#fff; }
  .num-1,.num-3,.num-6,.num-8 { background:#e8f5e9; color:var(--green); border:2px solid var(--green); }
  .num-2,.num-4,.num-7,.num-9 { background:#ffebee; color:var(--red); border:2px solid var(--red); }
  #lockBar { display:none; align-items:center; justify-content:center; gap:8px; background:#fff3e0; border:1.5px solid #ffb74d; border-radius:9px; padding:10px; margin-top:10px; }
  .history-section { background:#fff; margin:0 12px 12px; border-radius:12px; padding:14px; border:1px solid var(--border); }
  .history-dots { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
  .dot { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; animation:popIn .3s; }
  @keyframes popIn { from{opacity:0;transform:scale(.4)} to{opacity:1;transform:scale(1)} }
  .dot-red    { background:#ffebee; color:var(--red);   border:2px solid var(--red); }
  .dot-green  { background:#e8f5e9; color:var(--green); border:2px solid var(--green); }
  .dot-violet { background:#f3e5f5; color:#7b1fa2;      border:2px solid #7b1fa2; }
  .tab-nav { display:flex; background:var(--bg); border-radius:8px; margin:0 12px 10px; overflow:hidden; border:1.5px solid var(--border); }
  .tab-btn { flex:1; background:none; border:none; color:var(--muted); font-family:'Poppins',sans-serif; font-size:12px; font-weight:600; padding:9px; cursor:pointer; transition:all .2s; }
  .tab-btn.active { background:var(--orange); color:#fff; }
  .tab-content { display:none; }
  .tab-content.active { display:block; }
  .records-wrap { background:#fff; margin:0 12px; border-radius:12px; border:1px solid var(--border); overflow:hidden; margin-bottom:12px; }
  .records-table { width:100%; border-collapse:collapse; }
  .records-table th { background:var(--bg); color:var(--muted); font-size:10px; font-weight:600; text-transform:uppercase; padding:8px 10px; text-align:center; border-bottom:1px solid var(--border); }
  .records-table td { padding:10px; text-align:center; font-size:13px; border-bottom:1px solid #f5f5f5; }
  .result-badge { display:inline-block; width:26px; height:26px; border-radius:50%; line-height:26px; font-size:10px; font-weight:700; }
  .no-bets { text-align:center; color:var(--muted); padding:24px; font-size:12px; }
  .win-text { color:var(--green); font-weight:700; }
  .lose-text { color:var(--red); }
  .choice-pill { display:flex; align-items:center; gap:10px; background:var(--bg); border-radius:10px; padding:12px 14px; margin-bottom:14px; border:1px solid var(--border); }
  .choice-dot { width:18px; height:18px; border-radius:50%; flex-shrink:0; }
  .amount-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
  .amt-btn { background:var(--bg); border:1.5px solid var(--border); border-radius:7px; color:var(--text); font-family:'Poppins',sans-serif; font-size:13px; font-weight:600; padding:6px 14px; cursor:pointer; transition:all .15s; }
  .amt-btn:hover,.amt-btn.sel { border-color:var(--orange); color:var(--orange); background:#fff3e0; }
  .custom-amt { width:100%; background:var(--bg); border:1.5px solid var(--border); border-radius:9px; color:var(--text); font-family:'Poppins',sans-serif; font-size:15px; padding:11px 14px; text-align:center; outline:none; transition:border-color .2s; }
  .custom-amt:focus { border-color:var(--orange); }
  .potential { font-size:12px; color:var(--muted); text-align:center; margin-top:8px; }
  .potential span { color:var(--green); font-weight:700; }
  .result-icon   { font-size:56px; margin-bottom:10px; }
  .result-title  { font-size:20px; font-weight:800; margin-bottom:4px; }
  .result-win    { color:var(--green); }
  .result-lose   { color:var(--red); }
  .result-amount { font-size:26px; font-weight:800; color:var(--orange); margin:8px 0; }
  .result-detail { font-size:12px; color:var(--muted); margin-bottom:18px; }
  .btn-ok { background:var(--orange); border:none; border-radius:9px; color:#fff; font-family:'Poppins',sans-serif; font-size:14px; font-weight:700; padding:12px 40px; cursor:pointer; }
</style>
</head>
<body>

<div class="game-header">
  <div class="back-btn" onclick="window.location.href='home.html'">←</div>
  <div class="ghead-title">Color Prediction</div>
  <div class="ghead-bal" id="gameBalDisplay">₹0</div>
</div>

<div class="period-bar">
  <div><div class="plabel">Period</div><div class="pvalue" id="periodNum">...</div></div>
  <div><div class="tlabel">Next Draw</div><div class="timer-display" id="timerDisplay">00:30</div></div>
</div>

<div class="bet-section">
  <div class="shead">Choose Color</div>
  <div class="color-buttons">
    <button class="color-btn btn-red"    onclick="openBet('color','Red','#d32f2f',2)">Red<span class="cmult">2×</span></button>
    <button class="color-btn btn-violet" onclick="openBet('color','Violet','#7b1fa2',4.5)">Violet<span class="cmult">4.5×</span></button>
    <button class="color-btn btn-green2" onclick="openBet('color','Green','#2e7d32',2)">Green<span class="cmult">2×</span></button>
  </div>
  <div class="shead">Big / Small</div>
  <div class="bigsmall-row">
    <button class="bs-btn btn-big"   onclick="openBet('bigsmall','Big','#e65100',2)">BIG 📈<span class="bs-sub">(5–9) 2×</span></button>
    <button class="bs-btn btn-small" onclick="openBet('bigsmall','Small','#1565c0',2)">SMALL 📉<span class="bs-sub">(0–4) 2×</span></button>
  </div>
  <div class="shead">Choose Number</div>
  <div class="number-grid">
    <button class="num-btn num-0" onclick="openBet('number','0','#7b1fa2',9)">0</button>
    <button class="num-btn num-1" onclick="openBet('number','1','#2e7d32',9)">1</button>
    <button class="num-btn num-2" onclick="openBet('number','2','#d32f2f',9)">2</button>
    <button class="num-btn num-3" onclick="openBet('number','3','#2e7d32',9)">3</button>
    <button class="num-btn num-4" onclick="openBet('number','4','#d32f2f',9)">4</button>
    <button class="num-btn num-5" onclick="openBet('number','5','#7b1fa2',9)">5</button>
    <button class="num-btn num-6" onclick="openBet('number','6','#2e7d32',9)">6</button>
    <button class="num-btn num-7" onclick="openBet('number','7','#d32f2f',9)">7</button>
    <button class="num-btn num-8" onclick="openBet('number','8','#2e7d32',9)">8</button>
    <button class="num-btn num-9" onclick="openBet('number','9','#d32f2f',9)">9</button>
  </div>
  <div id="lockBar">
    <span style="font-size:18px">🔒</span>
    <span style="font-size:13px;font-weight:700;color:#e65100">Betting Locked — Draw in progress!</span>
  </div>
</div>

<div class="history-section">
  <div class="shead">Recent Results</div>
  <div class="history-dots" id="historyDots"></div>
</div>

<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('records',this)">Game Records</button>
  <button class="tab-btn"        onclick="switchTab('mybets',this)">My Bets</button>
</div>
<div class="tab-content active" id="tab-records">
  <div class="records-wrap"><table class="records-table">
    <thead><tr><th>Period</th><th>Number</th><th>Color</th><th>Size</th></tr></thead>
    <tbody id="recordsBody"></tbody>
  </table></div>
</div>
<div class="tab-content" id="tab-mybets">
  <div class="records-wrap"><table class="records-table">
    <thead><tr><th>Period</th><th>Bet</th><th>Amt</th><th>Result</th></tr></thead>
    <tbody id="myBetsBody"><tr><td colspan="4" class="no-bets">No bets yet</td></tr></tbody>
  </table></div>
</div>

<!-- BET MODAL -->
<div class="modal-overlay" id="betModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">Place Bet</div>
    <div class="modal-sub">Select amount and confirm</div>
    <div class="choice-pill">
      <div class="choice-dot" id="modalDot"></div>
      <div>
        <div style="font-size:14px;font-weight:600" id="modalChoiceText"></div>
        <div style="font-size:11px;color:var(--muted)" id="modalMultText"></div>
      </div>
    </div>
    <div class="amount-row">
      <button class="amt-btn" onclick="setAmt(10,this)">₹10</button>
      <button class="amt-btn" onclick="setAmt(50,this)">₹50</button>
      <button class="amt-btn" onclick="setAmt(100,this)">₹100</button>
      <button class="amt-btn" onclick="setAmt(500,this)">₹500</button>
    </div>
    <input type="number" class="custom-amt" id="betAmt" value="10" min="1">
    <div class="potential">Potential win: <span id="potentialWin">₹20</span></div>
    <div class="modal-btns">
      <button class="btn-cancel"  onclick="closeBetModal()">Cancel</button>
      <button class="btn-confirm" onclick="confirmBet()">Confirm Bet</button>
    </div>
  </div>
</div>

<!-- RESULT MODAL -->
<div class="modal-overlay center" id="resultModal">
  <div class="result-modal">
    <div class="result-icon"   id="resultIcon">🎉</div>
    <div class="result-title"  id="resultTitle">YOU WIN!</div>
    <div class="result-amount" id="resultAmount">+₹20</div>
    <div class="result-detail" id="resultDetail"></div>
    <button class="btn-ok" onclick="closeResult()">Collect</button>
  </div>
</div>

<script type="module">
  import {
    getSession, clearSession,
    getUser, updateUser,
    getGameState, setGameState,
    getGameHistory, addGameHistory,
    db, ref, onValue
  } from './firebase-config.js';

  const numColors = {0:['red','violet'],1:['green'],2:['red'],3:['green'],4:['red'],5:['red','violet'],6:['green'],7:['red'],8:['green'],9:['red']};
  let cu = null, wallet = 0, curBet = null, myBets = [], drawing = false;
  let currentPeriod = 20250313001, timeLeft = 30;

  window.addEventListener('load', async () => {
    cu = getSession();
    if (!cu) { window.location.href = 'index.html'; return; }
    const user = await getUser(cu);
    if (!user || user.blocked) { clearSession(); window.location.href = 'index.html'; return; }
    wallet = user.balance || 0;
    updateBalDisplay();

    // Load game state from Firebase
    const state = await getGameState();
    // Compute real timeLeft based on lastTick
    const elapsed = Math.floor((Date.now() - (state.lastTick || Date.now())) / 1000);
    timeLeft = Math.max(0, (state.timeLeft || 30) - elapsed);
    currentPeriod = state.period || 20250313001;

    document.getElementById('periodNum').textContent = currentPeriod;
    renderHistory();

    setInterval(tick, 1000);
  });

  // Listen to game history changes from Firebase
  import { ref as fbRef } from './firebase-config.js';

  async function tick() {
    timeLeft--;
    if (timeLeft < 0) timeLeft = 0;

    const locked = timeLeft <= 5;
    const d = document.getElementById('timerDisplay');
    const m = Math.floor(timeLeft/60), s = timeLeft % 60;
    d.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    d.className   = 'timer-display' + (locked ? ' urgent' : '');
    setBetLocked(locked);

    // Save to Firebase every 5 seconds to sync all users
    if (timeLeft % 5 === 0) {
      await setGameState({ timeLeft, period: currentPeriod, lastTick: Date.now() });
    }

    if (timeLeft <= 0 && !drawing) draw();
  }

  async function draw() {
    drawing = true;
    const num   = Math.floor(Math.random() * 10);
    const cols  = numColors[num];
    const color = cols[Math.floor(Math.random() * cols.length)];
    const size  = num >= 5 ? 'Big' : 'Small';

    await addGameHistory({ period: currentPeriod, number: num, color, size });
    renderHistory();
    renderRecords();

    myBets.forEach(async b => {
      if (b.period === currentPeriod && b.result === 'PENDING') {
        let won = false;
        if (b.type === 'color'    && b.choice.toLowerCase() === color) won = true;
        if (b.type === 'color'    && b.choice.toLowerCase() === 'violet' && cols.includes('violet')) won = true;
        if (b.type === 'number'   && parseInt(b.choice) === num) won = true;
        if (b.type === 'bigsmall' && b.choice === 'Big'   && num >= 5) won = true;
        if (b.type === 'bigsmall' && b.choice === 'Small' && num <= 4) won = true;

        b.result = won ? 'WIN' : 'LOSE';
        if (won) {
          b.winAmount = Math.floor(b.amount * b.mult);
          wallet += b.winAmount;
          const user = await getUser(cu);
          await updateUser(cu, {
            totalWins: (user.totalWins||0) + b.winAmount,
            balance: wallet
          });
        }
        showResult(won, num, color, size, b);
      }
    });

    renderMyBets();
    updateBalDisplay();

    setTimeout(async () => {
      currentPeriod++;
      timeLeft = 30;
      drawing  = false;
      setBetLocked(false);
      document.getElementById('periodNum').textContent = currentPeriod;
      await setGameState({ timeLeft: 30, period: currentPeriod, lastTick: Date.now() });
    }, 3000);
  }

  function updateBalDisplay() {
    document.getElementById('gameBalDisplay').textContent = '₹' + wallet.toLocaleString('en-IN');
  }

  function setBetLocked(locked) {
    document.querySelectorAll('.color-btn,.bs-btn,.num-btn').forEach(b => {
      b.disabled = locked; b.style.opacity = locked ? '0.38' : '1'; b.style.cursor = locked ? 'not-allowed' : 'pointer';
    });
    document.getElementById('lockBar').style.display = locked ? 'flex' : 'none';
  }

  async function renderHistory() {
    const h = await getGameHistory();
    document.getElementById('historyDots').innerHTML = h.slice(-12).reverse().map(r => {
      const c = r.color==='violet'?'dot-violet':r.color==='red'?'dot-red':'dot-green';
      return `<div class="dot ${c}">${r.number}</div>`;
    }).join('');
  }

  async function renderRecords() {
    const h = await getGameHistory();
    document.getElementById('recordsBody').innerHTML = h.slice(-15).reverse().map(r => {
      const bg = r.color==='red'?'#ffebee':r.color==='green'?'#e8f5e9':'#f3e5f5';
      const tc = r.color==='red'?'#d32f2f':r.color==='green'?'#2e7d32':'#7b1fa2';
      return `<tr>
        <td style="font-size:11px;color:var(--muted)">${r.period}</td>
        <td><span class="result-badge" style="background:${bg};color:${tc}">${r.number}</span></td>
        <td style="color:${tc};font-weight:600;text-transform:capitalize">${r.color}</td>
        <td style="font-size:12px;font-weight:600;color:${r.number>=5?'#e65100':'#1565c0'}">${r.size||''}</td>
      </tr>`;
    }).join('');
  }

  function renderMyBets() {
    if (!myBets.length) { document.getElementById('myBetsBody').innerHTML='<tr><td colspan="4" class="no-bets">No bets yet</td></tr>'; return; }
    document.getElementById('myBetsBody').innerHTML = myBets.slice().reverse().map(b => {
      const rc = b.result==='WIN'?'win-text':b.result==='LOSE'?'lose-text':'';
      const rv = b.result==='WIN'?`+₹${b.winAmount}`:b.result==='LOSE'?`-₹${b.amount}`:'...';
      return `<tr><td style="font-size:11px;color:var(--muted)">${b.period}</td><td>${b.choice}</td><td>₹${b.amount}</td><td class="${rc}">${rv}</td></tr>`;
    }).join('');
  }

  window.switchTab = function(tab, btn) {
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
    btn.classList.add('active'); document.getElementById('tab-'+tab).classList.add('active');
    if (tab==='mybets') renderMyBets();
  };

  function showResult(won, num, color, size, bet) {
    document.getElementById('resultIcon').textContent   = won ? '🎉' : '😔';
    document.getElementById('resultTitle').textContent  = won ? 'You Win!' : 'Better Luck!';
    document.getElementById('resultTitle').className    = 'result-title '+(won?'result-win':'result-lose');
    document.getElementById('resultAmount').textContent = won?`+₹${bet.winAmount}`:`-₹${bet.amount}`;
    document.getElementById('resultDetail').textContent = `Number: ${num} | Color: ${color} | ${size}`;
    document.getElementById('resultModal').classList.add('show');
  }
  window.closeResult = () => document.getElementById('resultModal').classList.remove('show');

  window.openBet = function(type, choice, color, mult) {
    if (timeLeft <= 5) { alert('Wait for next round!'); return; }
    curBet = { type, choice, color, mult };
    document.getElementById('modalTitle').textContent      = type==='color'?'Bet on Color':type==='bigsmall'?'Big / Small':'Bet on Number';
    document.getElementById('modalChoiceText').textContent = type==='number'?`Number ${choice}`:choice;
    document.getElementById('modalMultText').textContent   = `Multiplier: ${mult}×`;
    document.getElementById('modalDot').style.background   = color;
    document.getElementById('betAmt').value = 10;
    document.querySelectorAll('.amt-btn').forEach(b=>b.classList.remove('sel'));
    updatePotential();
    document.getElementById('betModal').classList.add('show');
  };
  window.closeBetModal = () => { document.getElementById('betModal').classList.remove('show'); curBet=null; };
  window.setAmt = (v,btn) => { document.getElementById('betAmt').value=v; document.querySelectorAll('.amt-btn').forEach(b=>b.classList.remove('sel')); btn.classList.add('sel'); updatePotential(); };
  function updatePotential() { const a=parseInt(document.getElementById('betAmt').value)||0; document.getElementById('potentialWin').textContent='₹'+Math.floor(a*(curBet?.mult||2)); }
  document.getElementById('betAmt').addEventListener('input', updatePotential);

  window.confirmBet = async function() {
    const amt = parseInt(document.getElementById('betAmt').value);
    if (!amt||amt<1) { alert('Enter valid amount!'); return; }
    if (amt>wallet)  { alert('Insufficient balance!'); return; }
    wallet -= amt;
    const user = await getUser(cu);
    await updateUser(cu, { bets:(user.bets||0)+1, balance:wallet });
    updateBalDisplay();
    myBets.push({ period:currentPeriod, type:curBet.type, choice:curBet.choice, amount:amt, mult:curBet.mult, result:'PENDING', winAmount:0 });
    renderMyBets();
    window.closeBetModal();
  };
</script>
</body>
</html>
