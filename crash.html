<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalyaan — Crash</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --red:#e8192c;
  --green:#23cb5e;
  --gold:#f5c842;
  --bg:#1a1a2e;
  --card:#16213e;
  --card2:#0f3460;
  --border:rgba(255,255,255,.08);
  --text:#fff;
  --muted:rgba(255,255,255,.45);
}
body{background:var(--bg);color:var(--text);font-family:'Poppins',sans-serif;min-height:100vh;padding-bottom:20px;overflow-x:hidden;}

/* ── TOP BAR ── */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--card);border-bottom:1px solid var(--border);}
.logo{font-size:18px;font-weight:900;background:linear-gradient(135deg,#e8192c,#f5c842);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.top-right{display:flex;align-items:center;gap:10px;}
.bal-chip{background:rgba(255,255,255,.08);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;}
.bal-amt{color:var(--gold);}
.icon-btn{background:rgba(255,255,255,.08);border:none;border-radius:8px;color:rgba(255,255,255,.7);font-size:16px;padding:6px 10px;cursor:pointer;}

/* ── CANVAS AREA ── */
.canvas-area{position:relative;background:radial-gradient(ellipse at 50% 120%,#1a0a2e 0%,#0d0d1a 60%,#050510 100%);height:260px;overflow:hidden;border-bottom:1px solid var(--border);}

/* Stars background */
.canvas-area::before{
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(1px 1px at 20% 30%,rgba(255,255,255,.6),transparent),
    radial-gradient(1px 1px at 80% 10%,rgba(255,255,255,.5),transparent),
    radial-gradient(1px 1px at 40% 70%,rgba(255,255,255,.4),transparent),
    radial-gradient(1px 1px at 60% 20%,rgba(255,255,255,.5),transparent),
    radial-gradient(1px 1px at 10% 60%,rgba(255,255,255,.3),transparent),
    radial-gradient(1px 1px at 90% 50%,rgba(255,255,255,.4),transparent),
    radial-gradient(1px 1px at 30% 90%,rgba(255,255,255,.3),transparent),
    radial-gradient(1px 1px at 70% 80%,rgba(255,255,255,.4),transparent);
  background-size:100% 100%;
}

canvas#crashCanvas{position:absolute;inset:0;width:100%;height:100%;}

/* Multiplier big display */
.mult-wrap{position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);text-align:center;z-index:20;pointer-events:none;}
.mult-num{font-size:58px;font-weight:900;line-height:1;transition:color .2s;letter-spacing:-1px;}
.mult-num.flying{color:#fff;text-shadow:0 0 30px rgba(255,255,255,.4);}
.mult-num.waiting{color:rgba(255,255,255,.3);font-size:22px;font-weight:700;}
.mult-num.crashed{color:var(--red);text-shadow:0 0 30px rgba(232,25,44,.6);}
.mult-x{font-size:30px;font-weight:900;}
.mult-sub{font-size:12px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:1px;}

/* Crashed overlay on canvas */
.crashed-overlay{position:absolute;inset:0;background:rgba(232,25,44,.08);z-index:15;display:none;animation:crashFlash .3s ease;}
@keyframes crashFlash{0%{background:rgba(232,25,44,.3)}100%{background:rgba(232,25,44,.08)}}

/* Plane SVG */
#planeWrap{position:absolute;z-index:25;pointer-events:none;display:none;transform-origin:center center;}

/* Trail particles */
.trail-canvas{position:absolute;inset:0;z-index:18;pointer-events:none;}

/* Countdown ring */
.countdown-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;display:none;}

/* History pills */
.hist-row{background:var(--card);padding:8px 12px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);}
.hist-row::-webkit-scrollbar{display:none;}
.hpill{flex:0 0 auto;border-radius:20px;padding:4px 11px;font-size:11px;font-weight:800;cursor:default;}
.hp-red  {background:rgba(232,25,44,.2);color:#ff6b7a;border:1px solid rgba(232,25,44,.3);}
.hp-gold {background:rgba(245,200,66,.15);color:#f5c842;border:1px solid rgba(245,200,66,.3);}
.hp-green{background:rgba(35,203,94,.15);color:#23cb5e;border:1px solid rgba(35,203,94,.3);}
.hp-blue {background:rgba(99,179,237,.15);color:#63b3ed;border:1px solid rgba(99,179,237,.3);}

/* ── LIVE BETS BAR ── */
.live-bar{background:var(--card);border-bottom:1px solid var(--border);padding:6px 14px;display:flex;align-items:center;justify-content:space-between;}
.live-pill{display:flex;align-items:center;gap:5px;background:rgba(35,203,94,.12);border:1px solid rgba(35,203,94,.25);border-radius:20px;padding:3px 10px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:#23cb5e;animation:lp 1s infinite;}
@keyframes lp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.5)}}
.live-txt{font-size:10px;font-weight:700;color:#23cb5e;}
.no-fee-badge{background:rgba(35,203,94,.12);border:1px solid rgba(35,203,94,.2);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700;color:#23cb5e;}

/* ── BET PANELS ── */
.panels-wrap{padding:10px 12px;display:flex;flex-direction:column;gap:10px;}

.bet-panel{background:var(--card);border-radius:14px;overflow:hidden;border:1px solid var(--border);}
.panel-tabs{display:flex;border-bottom:1px solid var(--border);}
.ptab{flex:1;background:none;border:none;border-bottom:2px solid transparent;font-family:'Poppins',sans-serif;font-size:12px;font-weight:700;padding:9px;cursor:pointer;color:var(--muted);transition:all .2s;}
.ptab.active{color:var(--green);border-bottom-color:var(--green);}
.panel-body{padding:12px;}

/* Amount input row */
.amt-ctrl{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.amt-minus,.amt-plus{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid var(--border);color:#fff;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.amt-input{flex:1;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);border-radius:10px;color:#fff;font-family:'Poppins',sans-serif;font-size:17px;font-weight:800;padding:9px 12px;text-align:center;outline:none;transition:all .2s;}
.amt-input:focus{border-color:rgba(255,255,255,.3);}

/* Quick amounts */
.quick-amts{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.qa{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:6px;color:rgba(255,255,255,.7);font-family:'Poppins',sans-serif;font-size:11px;font-weight:700;padding:5px 10px;cursor:pointer;transition:all .15s;}
.qa:hover,.qa.active{background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.25);}

/* Auto cashout row */
.auto-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.auto-label{font-size:11px;color:var(--muted);font-weight:600;flex:1;}
.auto-input{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#fff;font-family:'Poppins',sans-serif;font-size:13px;font-weight:700;padding:6px 10px;width:80px;text-align:center;outline:none;}
.auto-input:focus{border-color:rgba(255,255,255,.3);}
.auto-switch{width:40px;height:22px;border-radius:11px;background:rgba(255,255,255,.1);border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
.auto-switch.on{background:var(--green);}
.auto-switch::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .2s;}
.auto-switch.on::after{left:21px;}

/* BET / CASHOUT button */
.bet-btn{width:100%;border:none;border-radius:12px;font-family:'Poppins',sans-serif;font-size:15px;font-weight:800;padding:14px;cursor:pointer;transition:all .2s;letter-spacing:.3px;position:relative;}
.bet-btn.state-bet{background:linear-gradient(135deg,#23cb5e,#16a34a);color:#fff;box-shadow:0 4px 16px rgba(35,203,94,.35);}
.bet-btn.state-bet:hover{opacity:.93;}
.bet-btn.state-waiting{background:rgba(35,203,94,.15);color:#23cb5e;border:1.5px solid rgba(35,203,94,.3);cursor:default;}
.bet-btn.state-cashout{background:linear-gradient(135deg,#f5c842,#e09b10);color:#000;font-weight:900;box-shadow:0 4px 20px rgba(245,200,66,.4);animation:cashPulse 1s ease infinite;}
@keyframes cashPulse{0%,100%{box-shadow:0 4px 20px rgba(245,200,66,.4)}50%{box-shadow:0 4px 30px rgba(245,200,66,.7)}}
.bet-btn.state-locked{background:rgba(255,255,255,.05);color:rgba(255,255,255,.3);cursor:not-allowed;}
.bet-btn-sub{display:block;font-size:11px;font-weight:600;margin-top:3px;opacity:.8;}

/* Cashout multiplier on button */
.cashout-mult{font-size:22px;font-weight:900;}

/* ── ALL BETS / MY BETS TABLE ── */
.bets-section{margin:0 12px 12px;background:var(--card);border-radius:14px;overflow:hidden;border:1px solid var(--border);}
.bets-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 4px;}
.btab{flex:0 0 auto;background:none;border:none;border-bottom:2px solid transparent;font-family:'Poppins',sans-serif;font-size:11px;font-weight:700;padding:9px 14px;cursor:pointer;color:var(--muted);transition:all .2s;white-space:nowrap;}
.btab.active{color:#fff;border-bottom-color:var(--gold);}
.bets-table{width:100%;border-collapse:collapse;}
.bets-table th{background:rgba(255,255,255,.04);color:var(--muted);font-size:10px;font-weight:600;text-transform:uppercase;padding:7px 10px;text-align:left;border-bottom:1px solid var(--border);}
.bets-table td{padding:8px 10px;font-size:12px;border-bottom:1px solid rgba(255,255,255,.03);color:rgba(255,255,255,.8);}
.bets-table tr:last-child td{border-bottom:none;}
.td-mult{font-weight:800;}
.td-win{color:var(--green);font-weight:700;}
.td-lose{color:#f87171;}
.td-pend{color:var(--gold);}
.td-user{color:rgba(255,255,255,.5);font-size:11px;}

/* ── WIN COINS ── */
.win-overlay{position:fixed;inset:0;z-index:300;pointer-events:none;display:none;}
.coin{position:absolute;animation:coinRain 1.4s ease forwards;}
@keyframes coinRain{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(95vh) rotate(720deg);opacity:0}}

/* ── RESULT POPUP ── */
.popup-overlay{position:fixed;inset:0;z-index:250;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);display:none;align-items:flex-end;justify-content:center;}
.popup-overlay.show{display:flex;}
.popup{background:var(--card);border-radius:22px 22px 0 0;width:100%;max-width:480px;overflow:hidden;animation:slideUp .35s cubic-bezier(.34,1.2,.64,1);border-top:1px solid var(--border);}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.popup-header{padding:20px;text-align:center;}
.popup-header.win{background:linear-gradient(135deg,rgba(35,203,94,.3),rgba(22,163,74,.2));}
.popup-header.lose{background:linear-gradient(135deg,rgba(232,25,44,.3),rgba(185,28,28,.2));}
.popup-handle{width:36px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:0 auto 14px;}
.popup-icon{font-size:52px;margin-bottom:8px;display:block;}
.popup-title{font-size:20px;font-weight:900;}
.popup-sub{font-size:12px;color:var(--muted);margin-top:3px;}
.popup-body{padding:16px 18px;}
.popup-mult-row{display:flex;align-items:center;justify-content:center;gap:12px;background:rgba(255,255,255,.04);border-radius:12px;padding:12px;margin-bottom:12px;}
.pml{font-size:12px;color:var(--muted);font-weight:600;}
.pmv{font-size:30px;font-weight:900;color:var(--gold);}
.popup-amount{font-size:38px;font-weight:900;text-align:center;margin:6px 0 4px;}
.popup-amount.win{color:var(--green);}
.popup-amount.lose{color:var(--red);}
.popup-fee{font-size:11px;color:var(--muted);text-align:center;margin-bottom:12px;}
.popup-bar{background:rgba(255,255,255,.08);border-radius:4px;height:4px;overflow:hidden;margin-bottom:6px;}
.popup-fill{height:100%;background:linear-gradient(90deg,var(--gold),#e09b10);border-radius:4px;transition:width 1s linear;}
.popup-txt{font-size:11px;color:var(--muted);text-align:center;margin-bottom:14px;}
.popup-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.popup-close{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:10px;color:rgba(255,255,255,.7);font-family:'Poppins',sans-serif;font-size:13px;font-weight:700;padding:12px;cursor:pointer;}
.popup-play{background:linear-gradient(135deg,var(--green),#16a34a);border:none;border-radius:10px;color:#fff;font-family:'Poppins',sans-serif;font-size:13px;font-weight:700;padding:12px;cursor:pointer;}
</style>
</head>
<body>

<!-- Win coins -->
<div class="win-overlay" id="winOverlay"></div>

<!-- Result Popup -->
<div class="popup-overlay" id="resultPopup">
  <div class="popup">
    <div class="popup-header" id="popupHeader">
      <div class="popup-handle"></div>
      <span class="popup-icon" id="popupIcon">🏆</span>
      <div class="popup-title" id="popupTitle">Cashed Out!</div>
      <div class="popup-sub"   id="popupSub">You escaped in time!</div>
    </div>
    <div class="popup-body">
      <div class="popup-mult-row">
        <span class="pml">Multiplier</span>
        <span class="pmv" id="popupMult">2.50×</span>
      </div>
      <div class="popup-amount win" id="popupAmt">+₹250</div>
      <div class="popup-fee" id="popupFee">₹100 × 2.50× = ₹250 · No platform fee!</div>
      <div class="popup-bar"><div class="popup-fill" id="popupFill" style="width:100%"></div></div>
      <div class="popup-txt"  id="popupTxt">Auto close in 3s</div>
      <div class="popup-btns">
        <button class="popup-close" onclick="closePopup()">Close</button>
        <button class="popup-play"  onclick="closePopup()">Next Round 🚀</button>
      </div>
    </div>
  </div>
</div>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="logo">Kalyaan</div>
  <div class="top-right">
    <div class="bal-chip">💳 <span class="bal-amt" id="topBal">₹0</span></div>
    <button class="icon-btn" id="sndBtn" onclick="toggleSound()">🔊</button>
    <button class="icon-btn" onclick="window.location.href='home.html'">🏠</button>
  </div>
</div>

<!-- CANVAS AREA -->
<div class="canvas-area" id="canvasArea">
  <canvas id="crashCanvas"></canvas>
  <canvas class="trail-canvas" id="trailCanvas"></canvas>
  <div class="crashed-overlay" id="crashedOverlay"></div>

  <!-- Plane -->
  <div id="planeWrap" style="position:absolute;z-index:25;pointer-events:none;display:none;">
    <svg id="planeSVG" width="72" height="42" viewBox="0 0 72 42" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Main body -->
      <path d="M8 21 L52 10 L64 21 L52 32 Z" fill="#e8192c"/>
      <!-- Nose -->
      <path d="M52 10 L72 21 L52 32 Z" fill="#c0000f"/>
      <!-- Cockpit window -->
      <ellipse cx="56" cy="21" rx="5" ry="6" fill="#63b3ed" opacity="0.9"/>
      <ellipse cx="56" cy="21" rx="3" ry="4" fill="#90cdf4" opacity="0.7"/>
      <!-- Top wing -->
      <path d="M30 14 L42 3 L50 10 L34 16 Z" fill="#c0000f"/>
      <!-- Bottom wing -->
      <path d="M30 28 L42 39 L50 32 L34 26 Z" fill="#c0000f"/>
      <!-- Tail fin top -->
      <path d="M10 21 L18 8 L24 16 Z" fill="#a00008"/>
      <!-- Tail fin bottom -->
      <path d="M10 21 L18 34 L24 26 Z" fill="#a00008"/>
      <!-- Engine glow left -->
      <ellipse cx="8" cy="21" rx="4" ry="5" fill="#ff6b7a" opacity="0.6"/>
      <!-- Wing stripe -->
      <line x1="32" y1="10" x2="48" y2="16" stroke="#ff9999" stroke-width="1" opacity="0.5"/>
      <line x1="32" y1="32" x2="48" y2="26" stroke="#ff9999" stroke-width="1" opacity="0.5"/>
    </svg>
  </div>

  <!-- Multiplier display -->
  <div class="mult-wrap">
    <div class="mult-num waiting" id="multNum">Waiting...</div>
    <div class="mult-sub" id="multSub">Place your bets!</div>
  </div>
</div>

<!-- History pills -->
<div class="hist-row" id="histRow">
  <div style="color:var(--muted);font-size:11px;align-self:center">Loading...</div>
</div>

<!-- Live bar -->
<div class="live-bar">
  <div class="live-pill"><div class="live-dot"></div><span class="live-txt" id="liveCount">0 Online</span></div>
  <div class="no-fee-badge">✅ No Platform Fee</div>
</div>

<!-- BET PANELS — 2 panels side by side on bigger screen, stacked on mobile -->
<div class="panels-wrap">

  <!-- Panel 1 -->
  <div class="bet-panel" id="panel1">
    <div class="panel-tabs">
      <button class="ptab active" onclick="switchPTab(1,'bet',this)">Bet</button>
      <button class="ptab"        onclick="switchPTab(1,'auto',this)">Auto</button>
    </div>
    <div class="panel-body">
      <!-- Amount control -->
      <div class="amt-ctrl">
        <button class="amt-minus" onclick="changeAmt(1,-10)">−</button>
        <input type="number" class="amt-input" id="p1amt" value="10" min="10" max="100000" oninput="updateP1()">
        <button class="amt-plus"  onclick="changeAmt(1,10)">+</button>
      </div>
      <!-- Quick amounts -->
      <div class="quick-amts">
        <button class="qa active" onclick="setAmt(1,10,this)">1.00</button>
        <button class="qa" onclick="setAmt(1,20,this)">2.00</button>
        <button class="qa" onclick="setAmt(1,50,this)">5.00</button>
        <button class="qa" onclick="setAmt(1,100,this)">10.00</button>
      </div>
      <!-- Auto cashout (hidden by default) -->
      <div class="auto-row" id="p1autoRow" style="display:none">
        <span class="auto-label">Auto Cash Out</span>
        <input type="number" class="auto-input" id="p1auto" value="2.00" min="1.10" step="0.10">
        <button class="auto-switch" id="p1autoSwitch" onclick="toggleAutoSwitch(1)"></button>
      </div>
      <!-- BET BUTTON -->
      <button class="bet-btn state-bet" id="p1btn" onclick="handleBtn(1)">
        BET<span class="bet-btn-sub" id="p1sub">₹10</span>
      </button>
    </div>
  </div>

  <!-- Panel 2 -->
  <div class="bet-panel" id="panel2">
    <div class="panel-tabs">
      <button class="ptab active" onclick="switchPTab(2,'bet',this)">Bet</button>
      <button class="ptab"        onclick="switchPTab(2,'auto',this)">Auto</button>
    </div>
    <div class="panel-body">
      <div class="amt-ctrl">
        <button class="amt-minus" onclick="changeAmt(2,-10)">−</button>
        <input type="number" class="amt-input" id="p2amt" value="10" min="10" max="100000" oninput="updateP2()">
        <button class="amt-plus"  onclick="changeAmt(2,10)">+</button>
      </div>
      <div class="quick-amts">
        <button class="qa active" onclick="setAmt(2,10,this)">1.00</button>
        <button class="qa" onclick="setAmt(2,20,this)">2.00</button>
        <button class="qa" onclick="setAmt(2,50,this)">5.00</button>
        <button class="qa" onclick="setAmt(2,100,this)">10.00</button>
      </div>
      <div class="auto-row" id="p2autoRow" style="display:none">
        <span class="auto-label">Auto Cash Out</span>
        <input type="number" class="auto-input" id="p2auto" value="2.00" min="1.10" step="0.10">
        <button class="auto-switch" id="p2autoSwitch" onclick="toggleAutoSwitch(2)"></button>
      </div>
      <button class="bet-btn state-bet" id="p2btn" onclick="handleBtn(2)">
        BET<span class="bet-btn-sub" id="p2sub">₹10</span>
      </button>
    </div>
  </div>
</div>

<!-- BETS TABLE -->
<div class="bets-section">
  <div class="bets-tabs">
    <button class="btab active" onclick="switchBTab('all',this)">All Bets</button>
    <button class="btab"        onclick="switchBTab('my',this)">My Bets</button>
  </div>
  <div id="betsTableWrap">
    <table class="bets-table">
      <thead><tr><th>User</th><th>Bet</th><th>×</th><th>Cashout</th></tr></thead>
      <tbody id="allBetsBody"><tr><td colspan="4" style="text-align:center;padding:14px;color:var(--muted);font-size:11px">Loading bets...</td></tr></tbody>
    </table>
  </div>
</div>

<script type="module">
  import {
    getSession, clearSession, getUser, updateUser,
    calcWinAmountRaw,
    addTransaction, registerPresence, getLivePlayerCount,
    getCrashState, setCrashState, generateCrashPoint, calcCrashMultiplier,
    addCrashHistory, getCrashHistory,
    saveCrashBet, getCrashBets, updateCrashBet,
    db, ref, onValue, push, set as fbSet
  } from './firebase-config.js';

  // ── State ──
  let cu=null, wallet=0;
  let gamePhase='waiting';
  let crashAt=2.00, roundId=1, roundStart=0;
  let currentMult=1.00;
  let soundEnabled=localStorage.getItem('ky_sound_crash')!=='off';
  let audioCtx=null, popAutoTimer=null;
  let myBets=[], allBetsCache=[];
  let activeBetsTab='all';

  // Per-panel state
  const panels={
    1:{betPlaced:false,betAmt:10,betKey:null,cashedOut:false,cashedMult:0,autoOn:false,autoAt:2.00,mode:'bet'},
    2:{betPlaced:false,betAmt:10,betKey:null,cashedOut:false,cashedMult:0,autoOn:false,autoAt:2.00,mode:'bet'}
  };

  // Canvas
  const canvas=document.getElementById('crashCanvas');
  const ctx=canvas.getContext('2d');
  const trail=document.getElementById('trailCanvas');
  const tctx=trail.getContext('2d');
  let pts=[], planeX=0, planeY=0, planAngle=0;
  let particles=[];

  // ── Init ──
  window.addEventListener('load',async()=>{
    cu=getSession();
    if(!cu){window.location.href='index.html';return;}
    const user=await getUser(cu);
    if(!user||user.blocked){clearSession();window.location.href='index.html';return;}
    wallet=user.balance||0; updateBal();
    updateSndBtn();

    await registerPresence(cu);
    setInterval(()=>registerPresence(cu),30000);
    updateLive(); setInterval(updateLive,20000);

    resizeCanvas();
    window.addEventListener('resize',resizeCanvas);

    myBets=await getCrashBets(cu);
    renderBetsTable();
    renderHistPills();

    // Firebase listener
    onValue(ref(db,'crash/state'),async(snap)=>{
      if(!snap.exists())return;
      await syncState(snap.val());
    });

    // Also listen to all bets for live table
    onValue(ref(db,'crash/liveBets'),snap=>{
      if(snap.exists()) allBetsCache=Object.values(snap.val()).sort((a,b)=>b.time-a.time).slice(0,20);
      else allBetsCache=[];
      if(activeBetsTab==='all') renderAllBets();
    });

    const state=await getCrashState();
    await syncState(state);
    requestAnimationFrame(gameLoop);
  });

  // ── Resize ──
  function resizeCanvas(){
    canvas.width=trail.width=canvas.parentElement.offsetWidth;
    canvas.height=trail.height=canvas.parentElement.offsetHeight;
  }

  // ── State sync from Firebase ──
  async function syncState(state){
    const prev=gamePhase;
    roundId=state.roundId||1;
    const room_crashAt=parseFloat(state.crashAt)||2.00;

    if(state.phase==='waiting'){
      if(prev==='flying'||prev==='crashed') resetRound();
      gamePhase='waiting';
      const waitLeft=state.waitDuration-(Date.now()-(state.startTime||Date.now()));
      showWaiting(Math.max(0,Math.ceil(waitLeft/1000)));
      if(waitLeft>0) setTimeout(()=>{if(gamePhase==='waiting')startFlight(room_crashAt);},Math.max(100,waitLeft));
      else startFlight(room_crashAt);
    } else if(state.phase==='flying'){
      if(prev!=='flying') startFlight(room_crashAt,state.startTime);
    } else if(state.phase==='crashed'){
      if(prev==='flying') triggerCrash(room_crashAt);
    }
  }

  function showWaiting(sec){
    gamePhase='waiting';
    const mn=document.getElementById('multNum');
    mn.className='mult-num waiting';
    mn.textContent=sec>0?`${sec}s`:'Starting...';
    document.getElementById('multSub').textContent='Place your bets!';
    document.getElementById('planeWrap').style.display='none';
    document.getElementById('crashedOverlay').style.display='none';
    updateBtns();
  }

  function startFlight(cp,existStart=null){
    gamePhase='flying';
    crashAt=cp;
    roundStart=existStart||Date.now();
    pts=[];particles=[];
    document.getElementById('planeWrap').style.display='block';
    document.getElementById('crashedOverlay').style.display='none';
    document.getElementById('multNum').className='mult-num flying';
    document.getElementById('multSub').textContent='';
    updateBtns();
  }

  function triggerCrash(mult){
    gamePhase='crashed';
    currentMult=mult;
    playSound('crash');
    document.getElementById('planeWrap').style.display='none';
    document.getElementById('crashedOverlay').style.display='block';
    const mn=document.getElementById('multNum');
    mn.className='mult-num crashed';
    mn.textContent=mult.toFixed(2)+'×';
    document.getElementById('multSub').textContent='FLEW AWAY!';
    // Settle bets
    [1,2].forEach(p=>{
      const panel=panels[p];
      if(panel.betPlaced&&!panel.cashedOut) settleLoss(p,mult);
    });
    addCrashHistory({roundId,crashAt:mult,time:Date.now()});
    setTimeout(renderHistPills,400);
    setTimeout(async()=>{
      const nc=generateCrashPoint();
      await setCrashState({phase:'waiting',startTime:Date.now(),crashAt:nc,roundId:roundId+1,waitDuration:7000});
    },4500);
    updateBtns();
  }

  function resetRound(){
    [1,2].forEach(p=>{
      panels[p].betPlaced=false;panels[p].betKey=null;
      panels[p].cashedOut=false;panels[p].cashedMult=0;
    });
    pts=[];particles=[];
    document.getElementById('crashedOverlay').style.display='none';
    clearLiveBets();
  }

  // ── Game Loop ──
  function gameLoop(){
    if(gamePhase==='flying'){
      const elapsed=(Date.now()-roundStart)/1000;
      currentMult=parseFloat(Math.max(1.00,Math.pow(1.0024,elapsed*100)).toFixed(2));

      // Update display
      const mn=document.getElementById('multNum');
      mn.textContent=currentMult.toFixed(2)+'×';

      // Auto cashout
      [1,2].forEach(p=>{
        const panel=panels[p];
        if(panel.betPlaced&&!panel.cashedOut&&panel.autoOn&&currentMult>=panel.autoAt){
          performCashout(p);
        }
      });

      // Check crash client-side
      if(currentMult>=crashAt){
        setCrashState({phase:'crashed',crashAt,roundId,startTime:roundStart,waitDuration:7000});
        triggerCrash(crashAt);
      }

      // Update cashout buttons
      [1,2].forEach(p=>{
        if(panels[p].betPlaced&&!panels[p].cashedOut){
          const pot=calcWinAmountRaw(panels[p].betAmt,currentMult);
          const btn=document.getElementById(`p${p}btn`);
          btn.innerHTML=`<span class="cashout-mult">${currentMult.toFixed(2)}×</span><span class="bet-btn-sub">Cash Out ₹${pot.toLocaleString('en-IN')}</span>`;
        }
      });

      drawGraph(elapsed);
      drawPlane(elapsed);
      drawParticles();
    }
    requestAnimationFrame(gameLoop);
  }

  // ── Canvas drawing ──
  function drawGraph(elapsed){
    const W=canvas.width,H=canvas.height;
    ctx.clearRect(0,0,W,H);
    if(!pts.length){pts.push({x:elapsed,y:currentMult-1});return;}
    pts.push({x:elapsed,y:currentMult-1});
    if(pts.length>300)pts.shift();

    const maxX=Math.max(elapsed,1);
    const maxY=Math.max(currentMult-1,1.5);
    const PAD={l:30,b:30,r:20,t:20};
    const W2=W-PAD.l-PAD.r, H2=H-PAD.t-PAD.b;

    const tx=x=>PAD.l+(x/maxX)*W2;
    const ty=y=>H-PAD.b-(y/maxY)*H2;

    // Axes
    ctx.strokeStyle='rgba(255,255,255,.06)';
    ctx.lineWidth=1;
    for(let i=1;i<=4;i++){
      const y=H-PAD.b-(i/4)*H2;
      ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(W-PAD.r,y);ctx.stroke();
    }

    // Fill
    ctx.beginPath();
    ctx.moveTo(tx(0),ty(0));
    pts.forEach(p=>ctx.lineTo(tx(p.x),ty(p.y)));
    ctx.lineTo(tx(pts[pts.length-1].x),H-PAD.b);
    ctx.lineTo(tx(0),H-PAD.b);
    ctx.closePath();
    const grad=ctx.createLinearGradient(0,PAD.t,0,H-PAD.b);
    grad.addColorStop(0,'rgba(232,25,44,.35)');
    grad.addColorStop(1,'rgba(232,25,44,.04)');
    ctx.fillStyle=grad;ctx.fill();

    // Line glow
    ctx.shadowColor='#e8192c';ctx.shadowBlur=12;
    ctx.beginPath();
    ctx.moveTo(tx(0),ty(0));
    pts.forEach(p=>ctx.lineTo(tx(p.x),ty(p.y)));
    ctx.strokeStyle='#e8192c';ctx.lineWidth=2.5;
    ctx.lineJoin='round';ctx.stroke();
    ctx.shadowBlur=0;

    // Store last point
    if(pts.length){
      const last=pts[pts.length-1];
      planeX=tx(last.x);planeY=ty(last.y);
      if(pts.length>1){
        const prev=pts[pts.length-2];
        const dx=tx(last.x)-tx(prev.x);
        const dy=ty(last.y)-ty(prev.y);
        planAngle=Math.atan2(dy,dx)*(180/Math.PI);
        planAngle=Math.max(-50,Math.min(10,planAngle));
      }
      // Spawn trail particles
      if(Math.random()<0.4) spawnParticle(planeX,planeY);
    }
  }

  // ── Plane positioning ──
  function drawPlane(elapsed){
    const pw=document.getElementById('planeWrap');
    if(!planeX){pw.style.display='none';return;}
    pw.style.display='block';
    pw.style.left=(planeX-36)+'px';
    pw.style.top =(planeY-20)+'px';
    pw.style.transform=`rotate(${planAngle}deg)`;
  }

  // ── Trail particles ──
  function spawnParticle(x,y){
    particles.push({x,y,vx:-(2+Math.random()*3),vy:(Math.random()-0.5)*2,life:1,size:2+Math.random()*3});
  }
  function drawParticles(){
    tctx.clearRect(0,0,trail.width,trail.height);
    particles=particles.filter(p=>p.life>0);
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.life-=0.05;
      tctx.beginPath();
      tctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
      tctx.fillStyle=`rgba(232,25,44,${p.life*0.6})`;
      tctx.fill();
    });
  }

  // ── Bet handling ──
  window.handleBtn=async function(pNum){
    const panel=panels[pNum];
    if(gamePhase==='waiting'&&!panel.betPlaced){
      await placeBet(pNum);
    } else if(gamePhase==='waiting'&&panel.betPlaced){
      cancelBet(pNum);
    } else if(gamePhase==='flying'&&panel.betPlaced&&!panel.cashedOut){
      await performCashout(pNum);
    }
  };

  async function placeBet(pNum){
    const amt=parseInt(document.getElementById(`p${pNum}amt`).value)||10;
    if(amt<10){alert('Minimum bet ₹10');return;}
    if(amt>100000){alert('Maximum ₹1,00,000');return;}
    if(amt>wallet){alert('Insufficient balance!');return;}
    wallet-=amt;panels[pNum].betAmt=amt;
    const user=await getUser(cu);
    await updateUser(cu,{bets:(user.bets||0)+1,balance:wallet});
    await addTransaction(cu,{type:'bet',amount:amt,desc:`Crash bet P${pNum} — Round #${roundId}`,time:Date.now()});
    updateBal();
    panels[pNum].betPlaced=true;panels[pNum].cashedOut=false;
    // Save bet
    const betObj={roundId,amount:amt,panelNum:pNum,cashedAt:null,result:'PENDING',winAmount:0,time:Date.now()};
    await saveCrashBet(cu,betObj);
    // Add to live bets
    await push(ref(db,'crash/liveBets'),{user:cu.substring(0,4)+'***'+cu.slice(-2),bet:amt,mult:null,cashout:null,time:Date.now()});
    myBets=await getCrashBets(cu);
    updateBtns();
    playSound('bet');
  }

  function cancelBet(pNum){
    if(gamePhase!=='waiting'||!panels[pNum].betPlaced)return;
    wallet+=panels[pNum].betAmt;
    updateUser(cu,{balance:wallet});
    updateBal();
    panels[pNum].betPlaced=false;
    updateBtns();
  }

  async function performCashout(pNum){
    const panel=panels[pNum];
    if(!panel.betPlaced||panel.cashedOut||gamePhase!=='flying')return;
    panel.cashedOut=true; panel.cashedMult=currentMult;
    const net=calcWinAmountRaw(panel.betAmt,currentMult);
    wallet+=net;
    const user=await getUser(cu);
    await updateUser(cu,{totalWins:(user.totalWins||0)+net,balance:wallet});
    await addTransaction(cu,{type:'win',amount:net,desc:`Crash cashout ${currentMult.toFixed(2)}× Round #${roundId}`,time:Date.now()});
    // Update bet record
    const freshBets=await getCrashBets(cu);
    const b=freshBets.find(x=>x.roundId===roundId&&x.panelNum===pNum&&x.result==='PENDING');
    if(b?._key)await updateCrashBet(cu,b._key,{cashedAt:currentMult,result:'WIN',winAmount:net});
    myBets=await getCrashBets(cu);
    updateBal(); updateBtns();
    playSound('win'); triggerWinAnim();
    showResultPopup(true,net,currentMult,panel.betAmt);
    renderBetsTable();
  }

  async function settleLoss(pNum,crashMult){
    const panel=panels[pNum];
    if(!panel.betPlaced)return;
    panel.betPlaced=false;
    const freshBets=await getCrashBets(cu);
    const b=freshBets.find(x=>x.roundId===roundId&&x.panelNum===pNum&&x.result==='PENDING');
    if(b?._key)await updateCrashBet(cu,b._key,{cashedAt:null,result:'LOSE',winAmount:0});
    await addTransaction(cu,{type:'lose',amount:panel.betAmt,desc:`Crash lost ${crashMult.toFixed(2)}× Round #${roundId}`,time:Date.now()});
    myBets=await getCrashBets(cu);
    renderBetsTable();
    showResultPopup(false,panel.betAmt,crashMult,panel.betAmt);
  }

    await fbSet(ref(db,'crash/liveBets'),null);
  }

  // ── Button states ──
  function updateBtns(){
    [1,2].forEach(p=>{
      const panel=panels[p];
      const btn=document.getElementById(`p${p}btn`);
      const sub=document.getElementById(`p${p}sub`);
      const amt=panel.betAmt||parseInt(document.getElementById(`p${p}amt`).value)||10;

      if(gamePhase==='waiting'&&!panel.betPlaced){
        btn.className='bet-btn state-bet';
        btn.innerHTML=`BET<span class="bet-btn-sub">₹${amt.toLocaleString('en-IN')}</span>`;
      } else if(gamePhase==='waiting'&&panel.betPlaced){
        btn.className='bet-btn state-waiting';
        btn.innerHTML=`CANCEL<span class="bet-btn-sub">₹${panel.betAmt} placed ✓</span>`;
      } else if(gamePhase==='flying'&&panel.betPlaced&&!panel.cashedOut){
        const pot=calcWinAmountRaw(panel.betAmt,currentMult);
        btn.className='bet-btn state-cashout';
        btn.innerHTML=`<span class="cashout-mult">${currentMult.toFixed(2)}×</span><span class="bet-btn-sub">Cash Out ₹${pot.toLocaleString('en-IN')}</span>`;
      } else if(gamePhase==='flying'&&!panel.betPlaced){
        btn.className='bet-btn state-locked';
        btn.innerHTML=`IN FLIGHT<span class="bet-btn-sub">Next round</span>`;
      } else if(gamePhase==='crashed'){
        btn.className='bet-btn state-bet';
        btn.innerHTML=`BET<span class="bet-btn-sub">Next round starting...</span>`;
      } else if(panel.cashedOut){
        btn.className='bet-btn state-locked';
        btn.innerHTML=`CASHED OUT<span class="bet-btn-sub">${panel.cashedMult.toFixed(2)}× ✓</span>`;
      }
    });
  }

  window.toggleAutoSwitch=function(pNum){

  // ── Bets table ──
  window.switchBTab=function(tab,btn){
    activeBetsTab=tab;
    document.querySelectorAll('.btab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');

  function renderBetsTable(){
    if(activeBetsTab==='all') renderAllBets();
    else renderMyBets2();
  }

  function renderAllBets(){
    const body=document.getElementById('allBetsBody');
    if(!allBetsCache.length){body.innerHTML='<tr><td colspan="4" style="text-align:center;padding:14px;color:var(--muted);font-size:11px">No bets yet</td></tr>';return;}
    body.innerHTML=allBetsCache.map(b=>{
      const cashStr=b.mult?`<span class="td-mult" style="color:${b.mult>=2?'#4ade80':'#fbbf24'}">${b.mult.toFixed(2)}×</span>`:'<span class="td-pend">—</span>';
      const cashoutStr=b.cashout?`<span class="td-win">₹${b.cashout}</span>`:'<span class="td-pend">⏳</span>';
      return `<tr><td class="td-user">${b.user||'—'}</td><td>₹${b.bet||0}</td><td>${cashStr}</td><td>${cashoutStr}</td></tr>`;
    }).join('');
  }

  function renderMyBets2(){
    const body=document.getElementById('allBetsBody');
    if(!myBets.length){body.innerHTML='<tr><td colspan="4" style="text-align:center;padding:14px;color:var(--muted);font-size:11px">No bets in 24h</td></tr>';return;}
    body.innerHTML=myBets.map(b=>{
      const isW=b.result==='WIN',isL=b.result==='LOSE';
      const cashStr=b.cashedAt?`<span style="color:#fbbf24;font-weight:700">${parseFloat(b.cashedAt).toFixed(2)}×</span>`:'<span style="color:var(--muted)">—</span>';
      const rv=isW?`<span class="td-win">+₹${b.winAmount}</span>`:isL?`<span class="td-lose">-₹${b.amount}</span>`:'<span class="td-pend">⏳</span>';
      return `<tr><td style="color:var(--muted)">#${b.roundId||'—'}</td><td>₹${b.amount}</td><td>${cashStr}</td><td>${rv}</td></tr>`;
    }).join('');
  }

    const h=await getCrashHistory();

      const m=parseFloat(r.crashAt)||1;

  // ── Result popup ──
  function showResultPopup(won,amount,mult,bet){
    document.getElementById('popupHeader').className='popup-header '+(won?'win':'lose');
    document.getElementById('popupIcon').textContent=won?'🏆':'💥';
    document.getElementById('popupTitle').textContent=won?'Cashed Out!':'Crashed!';
    document.getElementById('popupSub').textContent=won?`Escaped at ${mult.toFixed(2)}×!`:`Crashed at ${mult.toFixed(2)}×`;
    document.getElementById('popupMult').textContent=mult.toFixed(2)+'×';
    const amtEl=document.getElementById('popupAmt');
    amtEl.textContent=won?`+₹${amount.toLocaleString('en-IN')}`:`-₹${bet.toLocaleString('en-IN')}`;
    amtEl.className='popup-amount '+(won?'win':'lose');
    document.getElementById('popupFee').textContent=won?`₹${bet} × ${mult.toFixed(2)}× = ₹${amount} · No fee!`:`Bet ₹${bet} · Better luck next time!`;
    document.getElementById('resultPopup').classList.add('show');
    let cd=3;
    const fill=document.getElementById('popupFill');
    const txt=document.getElementById('popupTxt');
    fill.style.width='100%';
    if(popAutoTimer)clearInterval(popAutoTimer);
    popAutoTimer=setInterval(()=>{
      cd--;fill.style.width=(cd/3*100)+'%';txt.textContent=cd>0?`Auto close in ${cd}s`:'Closing...';
      if(cd<=0){clearInterval(popAutoTimer);closePopup();}
    },1000);
  }
  window.closePopup=function(){if(popAutoTimer)clearInterval(popAutoTimer);document.getElementById('resultPopup').classList.remove('show');};

  // ── Win animation ──
  function triggerWinAnim(){
    const ov=document.getElementById('winOverlay');ov.style.display='block';ov.innerHTML='';
    const em=['🪙','💰','✨','🚀','🎉','💎','🏆'];
    for(let i=0;i<20;i++){
      const c=document.createElement('div');c.className='coin';
      c.textContent=em[Math.floor(Math.random()*em.length)];
      c.style.cssText=`left:${Math.random()*100}%;animation-delay:${Math.random()*0.9}s;font-size:${18+Math.random()*20}px`;
      ov.appendChild(c);
    }
    setTimeout(()=>{ov.style.display='none';ov.innerHTML='';},2500);
  }

  // ── Sound ──
  function getACtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
  function playSound(type){
    if(!soundEnabled)return;
    try{
      const c=getACtx();
      if(type==='bet'){
        const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);
        o.type='sine';o.frequency.value=880;g.gain.setValueAtTime(0.15,c.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.1);o.start();o.stop(c.currentTime+0.1);
      } else if(type==='win'){
        [523,659,784,1047].forEach((f,i)=>{
          const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);
          o.frequency.value=f;g.gain.setValueAtTime(0.12,c.currentTime+i*0.1);
          g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+i*0.1+0.15);
          o.start(c.currentTime+i*0.1);o.stop(c.currentTime+i*0.1+0.15);
        });
      } else if(type==='crash'){
        // Explosion sound
        const buf=c.createBuffer(1,c.sampleRate*0.5,c.sampleRate);
        const data=buf.getChannelData(0);
        for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*Math.exp(-i/data.length*6);
        const src=c.createBufferSource(),g=c.createGain();
        src.buffer=buf;src.connect(g);g.connect(c.destination);
        g.gain.setValueAtTime(0.4,c.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.5);
        src.start();
        // Also falling tone
        const o=c.createOscillator(),g2=c.createGain();o.connect(g2);g2.connect(c.destination);
        o.type='sawtooth';o.frequency.setValueAtTime(400,c.currentTime);
        o.frequency.exponentialRampToValueAtTime(60,c.currentTime+0.4);
        g2.gain.setValueAtTime(0.2,c.currentTime);g2.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.4);
        o.start();o.stop(c.currentTime+0.4);
      }
    }catch(e){}
  }
