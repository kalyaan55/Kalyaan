<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalyaan — Login</title>
<link rel="stylesheet" href="style.css">
<style>
body {
  background:var(--bg); display:flex; flex-direction:column;
  align-items:center; justify-content:center; min-height:100vh; padding:20px;
  transition:background .3s;
}
[data-theme="dark"] body { background:linear-gradient(160deg,#0d0d1a 0%,#1a0d35 100%); }
[data-theme="light"] body { background:linear-gradient(160deg,#f3f0ff 0%,#e8e0ff 100%); }

.theme-corner { position:fixed; top:16px; right:16px; z-index:10; }

.splash {
  position:fixed; inset:0; z-index:999;
  background:linear-gradient(135deg,#1a0050,#4c1d95,#1a0050);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  transition:opacity .6s;
}
.splash-logo { font-size:56px; font-weight:900; color:#fff; letter-spacing:-2px; margin-bottom:8px; }
.splash-logo span { color:var(--gold); }
.splash-sub { font-size:14px; color:rgba(255,255,255,.6); margin-bottom:40px; }
.splash-bar { width:160px; height:4px; background:rgba(255,255,255,.15); border-radius:2px; overflow:hidden; }
.splash-fill { height:100%; background:linear-gradient(90deg,var(--primary),var(--gold)); border-radius:2px; animation:load 1.8s ease forwards; }
@keyframes load { from{width:0} to{width:100%} }

.auth-box { width:100%; max-width:380px; }
.auth-logo { font-size:40px; font-weight:900; text-align:center; letter-spacing:-1px; margin-bottom:4px;
  background:linear-gradient(135deg,var(--primary),var(--gold));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.auth-sub  { font-size:13px; color:var(--muted); text-align:center; margin-bottom:24px; }

.auth-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:20px; padding:24px; box-shadow:var(--shadow2);
  transition:background .3s;
}
.auth-tabs { display:flex; background:var(--bg); border-radius:10px; overflow:hidden; margin-bottom:22px; border:1px solid var(--border); }
.auth-tab  { flex:1; background:none; border:none; font-family:'Poppins',sans-serif; font-size:14px; font-weight:600; padding:11px; cursor:pointer; color:var(--muted); transition:all .2s; }
.auth-tab.active { background:var(--primary); color:#fff; border-radius:8px; }

.btn-auth {
  width:100%; background:linear-gradient(135deg,var(--primary),var(--primary2));
  border:none; border-radius:10px; color:#fff; font-family:'Poppins',sans-serif;
  font-size:15px; font-weight:700; padding:14px; cursor:pointer; margin-top:4px;
  transition:opacity .2s; box-shadow:0 4px 16px rgba(124,58,237,.3);
}
.btn-auth:hover { opacity:.9; }
.auth-msg { font-size:12px; text-align:center; margin-top:8px; min-height:18px; }
.auth-msg.error   { color:var(--red); }
.auth-msg.success { color:var(--green); }
.uid-box { background:var(--bg); border:1.5px solid var(--border); border-radius:10px; padding:11px 13px; font-size:14px; color:var(--muted); margin-bottom:14px; }
.ref-note { font-size:11px; color:var(--muted); text-align:center; margin-top:12px; }
.ref-note span { color:var(--gold); font-weight:700; }
</style>
</head>
<body>

<!-- Splash Screen -->
<div class="splash" id="splash">
  <div class="splash-logo">K<span>alyaan</span></div>
  <div class="splash-sub">🎮 India's #1 Prediction Platform</div>
  <div class="splash-bar"><div class="splash-fill"></div></div>
</div>

<!-- Dark Mode Toggle -->
<div class="theme-corner">
  <button class="theme-btn" id="themeBtn" onclick="switchTheme()">🌙</button>
</div>

<div class="auth-box fade-up">
  <div class="auth-logo">Kalyaan</div>
  <div class="auth-sub">🎮 India's #1 Prediction Gaming Platform</div>

  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login',this)">Login</button>
      <button class="auth-tab" onclick="switchTab('register',this)">Register</button>
    </div>

    <!-- LOGIN -->
    <div id="loginForm">
      <label class="form-label">Username</label>
      <input class="form-input" id="loginUser" placeholder="Enter username" />
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="loginPass" placeholder="Enter password"
        onkeydown="if(event.key==='Enter')doLogin()" />
      <button class="btn-auth" id="loginBtn" onclick="doLogin()">LOGIN</button>
      <div class="auth-msg error" id="loginError"></div>
    </div>

    <!-- REGISTER -->
    <div id="registerForm" style="display:none">
      <label class="form-label">Full Name</label>
      <input class="form-input" id="regName" placeholder="Your full name" />
      <label class="form-label">Username</label>
      <input class="form-input" id="regUser" placeholder="Choose username (min 3 chars)" oninput="genUID()" />
      <label class="form-label">Your ID (Auto-Generated)</label>
      <div class="uid-box" id="regUID">Will be generated...</div>
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="regPass" placeholder="Min 6 characters" />
      <label class="form-label">Referral Code <span style="font-weight:400;text-transform:none">(Optional)</span></label>
      <input class="form-input" id="regRef" placeholder="Enter referral code for bonus" style="text-transform:uppercase" />
      <button class="btn-auth" id="regBtn" onclick="doRegister()">CREATE ACCOUNT</button>
      <div class="auth-msg" id="registerMsg"></div>
      <div class="ref-note">Use referral code → Get <span>+₹20 bonus</span> 🎁</div>
    </div>
  </div>
</div>

<script type="module">
  import {
    ADMIN_USER, ADMIN_PASS,
    getSession, setSession, clearSession,
    getAdminSession, setAdminSession,
    initTheme, toggleTheme, getTheme,
    getUser, saveUser, getAllUsers,
    getNextUID, applyReferral, addTransaction
  } from './firebase-config.js';

  // Init theme
  initTheme();
  updateThemeBtn();

  // Hide splash after 2s
  setTimeout(() => {
    const s = document.getElementById('splash');
    s.style.opacity = '0';
    setTimeout(() => s.style.display='none', 600);
  }, 2000);

  // Auto redirect
  window.addEventListener('load', async () => {
    if (getAdminSession()) { window.location.href='admin.html'; return; }
    const cu = getSession();
    if (cu) {
      const user = await getUser(cu);
      if (user && !user.blocked) { window.location.href='home.html'; }
    }
  });

  function updateThemeBtn() {
    document.getElementById('themeBtn').textContent = getTheme()==='dark' ? '☀️' : '🌙';
  }
  window.switchTheme = function() { toggleTheme(); updateThemeBtn(); };

  window.switchTab = function(tab, btn) {
    document.querySelectorAll('.auth-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('loginForm').style.display    = tab==='login'?'block':'none';
    document.getElementById('registerForm').style.display = tab==='register'?'block':'none';
  };

  window.genUID = async function() {
    const v = document.getElementById('regUser').value.trim();
    if (!v) { document.getElementById('regUID').textContent='Will be generated...'; return; }
    const all = await getAllUsers();
    document.getElementById('regUID').textContent = 'KY'+String(Object.keys(all).length+1).padStart(6,'0');
  };

  window.doLogin = async function() {
  const u   = document.getElementById('loginUser').value.trim().toLowerCase();
  const p   = document.getElementById('loginPass').value;
  const err = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  if (!u||!p) { err.textContent='Fill all fields'; return; }
  if (u===ADMIN_USER && p===ADMIN_PASS) { setAdminSession(); window.location.href='admin.html'; return; }
  btn.textContent='Checking...'; btn.disabled=true;
  try {
    const res = await fetch('https://kalyaan-backend-production.up.railway.app/auth/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:u, password:p})
    });
    const data = await res.json();
    if (!data.success) { err.textContent=data.msg||'Login failed'; return; }
    localStorage.setItem('ky_token', data.token);
    setSession(u);
    window.location.href='home.html';
  } catch(e) {
    err.textContent='Server error. Try again.';
  } finally {
    btn.textContent='LOGIN'; btn.disabled=false;
  }
};

  window.doRegister = async function() {
  const name   = document.getElementById('regName').value.trim();
  const user   = document.getElementById('regUser').value.trim().toLowerCase();
  const pass   = document.getElementById('regPass').value;
  const refCode= document.getElementById('regRef').value.trim().toUpperCase();
  const msg    = document.getElementById('registerMsg');
  const btn    = document.getElementById('regBtn');
  msg.className='auth-msg error';

  if (!name||!user||!pass) { msg.textContent='Fill all fields'; return; }
  if (user.length<3)        { msg.textContent='Username min 3 chars'; return; }
  if (pass.length<6)        { msg.textContent='Password min 6 chars'; return; }

  btn.textContent='Creating...'; btn.disabled=true;
  try {
    const res = await fetch('https://kalyaan-backend-production.up.railway.app/auth/register', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name, username:user, password:pass, referralCode:refCode})
    });
    const data = await res.json();
    if (!data.success) { msg.textContent=data.msg||'Registration failed'; return; }
    msg.className='auth-msg success';
    msg.textContent = '✅ Account created! Logging in...';
    localStorage.setItem('ky_token', data.token);
    setSession(user);
    setTimeout(() => { window.location.href='home.html'; }, 900);
  } catch(e) {
    msg.textContent='Server error. Try again.';
  } finally {
    btn.textContent='CREATE ACCOUNT'; btn.disabled=false;
  }
};
</script>
</body>
</html>
