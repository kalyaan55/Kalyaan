<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Kalyaan</title>
<!-- No branding, minimal title for security -->
<link rel="stylesheet" href="style.css">
<style>
body { background:#060612; padding-bottom:30px; min-height:100vh; }

/* Lock screen */
#lockScreen {
  position:fixed; inset:0; background:#060612; z-index:999;
  display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px;
}
.lock-logo { font-size:48px; margin-bottom:12px; }
.lock-title { font-size:18px; font-weight:800; color:#fff; margin-bottom:4px; }
.lock-sub   { font-size:12px; color:#6b7280; margin-bottom:28px; }
.lock-card  { background:#13132a; border:1px solid #2d2d55; border-radius:16px; padding:24px; width:100%; max-width:340px; }
.lock-input { width:100%; background:#0d0d1a; border:1.5px solid #2d2d55; border-radius:10px; color:#fff; font-family:'Poppins',sans-serif; font-size:14px; padding:12px 14px; outline:none; margin-bottom:12px; }
.lock-input:focus { border-color:var(--primary); }
.lock-input::placeholder { color:#4b5563; }
.lock-btn   { width:100%; background:linear-gradient(135deg,var(--primary),var(--primary2)); border:none; border-radius:10px; color:#fff; font-family:'Poppins',sans-serif; font-size:14px; font-weight:700; padding:13px; cursor:pointer; }
.lock-err   { font-size:12px; color:var(--red); text-align:center; margin-top:8px; min-height:16px; }
.wrong-attempts { font-size:11px; color:#6b7280; text-align:center; margin-top:8px; }

/* Admin UI */
.admin-header { background:#13132a; border-bottom:1px solid #2d2d55; padding:13px 16px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.admin-logo   { font-size:16px; font-weight:800; color:#fff; }
.admin-logo span { color:var(--primary2); }
.btn-logout   { background:#ef4444; border:none; border-radius:8px; color:#fff; font-family:'Poppins',sans-serif; font-size:12px; font-weight:600; padding:8px 16px; cursor:pointer; }

.stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:14px; }
.stat-card  { background:#13132a; border-radius:12px; border:1px solid #2d2d55; padding:14px; }
.sc-label   { font-size:10px; color:#6b7280; font-weight:600; text-transform:uppercase; }
.sc-val     { font-size:22px; font-weight:800; margin-top:4px; }

/* Force Result Card */
.force-card { background:#13132a; border:1px solid #2d2d55; border-radius:14px; margin:0 14px 14px; padding:16px; }
.force-title { font-size:14px; font-weight:700; color:#fff; margin-bottom:4px; }
.force-sub   { font-size:11px; color:#6b7280; margin-bottom:12px; }
.force-nums  { display:grid; grid-template-columns:repeat(5,1fr); gap:7px; margin-bottom:12px; }
.force-num   { aspect-ratio:1; border-radius:8px; background:#1a1a35; border:1.5px solid #2d2d55; color:#9ca3af; font-size:16px; font-weight:700; cursor:pointer; font-family:'Poppins',sans-serif; transition:all .15s; }
.force-num:hover,.force-num.selected { background:var(--primary); border-color:var(--primary); color:#fff; }
.force-btn   { background:linear-gradient(135deg,var(--red),#dc2626); border:none; border-radius:8px; color:#fff; font-family:'Poppins',sans-serif; font-size:13px; font-weight:700; padding:10px 20px; cursor:pointer; }
.force-clear { background:#374151; border:none; border-radius:8px; color:#9ca3af; font-family:'Poppins',sans-serif; font-size:13px; font-weight:600; padding:10px 20px; cursor:pointer; margin-left:8px; }
.forced-status { font-size:12px; color:var(--gold); margin-top:8px; min-height:16px; }

.search-wrap  { padding:0 14px 10px; }
.search-input { width:100%; border:1.5px solid #2d2d55; border-radius:10px; padding:10px 13px; font-family:'Poppins',sans-serif; font-size:14px; outline:none; background:#13132a; color:#fff; }
.search-input::placeholder { color:#4b5563; }
.search-input:focus { border-color:var(--primary); }

.users-list { padding:0 14px; }
.user-row   { background:#13132a; border:1px solid #2d2d55; border-radius:12px; padding:14px; margin-bottom:10px; }
.user-row.blocked { background:#1f0a0a; border-color:#7f1d1d; }
.ur-name    { color:#f1f0ff !important; }
.ur-meta    { color:#6b7280 !important; }
.ur-stat    { background:#0d0d1a !important; }
.ur-stat-label { color:#6b7280 !important; }
.ur-stat-val   { color:#e5e7eb !important; }

.edit-row { margin-bottom:12px; }
.edit-row .form-input { background:#0d0d1a !important; border-color:#2d2d55 !important; color:#fff !important; margin-bottom:0; }
.coins-row { display:flex; gap:8px; }
.coins-row .form-input { flex:1; margin-bottom:0; }
.btn-add    { background:#10b981; border:none; border-radius:8px; color:#fff; font-family:'Poppins',sans-serif; font-size:12px; font-weight:700; padding:0 14px; cursor:pointer; white-space:nowrap; }
.btn-remove { background:#ef4444; border:none; border-radius:8px; color:#fff; font-family:'Poppins',sans-serif; font-size:12px; font-weight:700; padding:0 14px; cursor:pointer; white-space:nowrap; }
.no-users   { text-align:center; color:#6b7280; padding:30px; font-size:13px; }

/* Dark modal override */
.modal { background:#1a1a35; border:1px solid #2d2d55; }
.modal-title { color:#f1f0ff; }
.modal-sub   { color:#6b7280; }
.form-label  { color:#9ca3af !important; }
.btn-cancel  { background:#0d0d1a; border-color:#2d2d55; color:#9ca3af; }
</style>
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lockScreen">
  <div class="lock-logo">🔐</div>
  <div class="lock-title">Admin Access</div>
  <div class="lock-sub">Authorized personnel only</div>
  <div class="lock-card">
    <input class="lock-input" id="lockUser" placeholder="Username" onkeydown="if(event.key==='Enter')tryUnlock()">
    <input class="lock-input" type="password" id="lockPass" placeholder="Password" onkeydown="if(event.key==='Enter')tryUnlock()">
    <input class="lock-input" type="password" id="lockSecret" placeholder="Admin secret key" onkeydown="if(event.key==='Enter')tryUnlock()">
    <button class="lock-btn" onclick="tryUnlock()">Access Panel</button>
    <div class="lock-err" id="lockErr"></div>
    <div class="wrong-attempts" id="attemptsLeft"></div>
  </div>
</div>

<!-- ADMIN PANEL (hidden until unlocked) -->
<div id="adminPanel" style="display:none">
  <div class="admin-header">
    <div class="admin-logo">⚙️ <span>Kalyaan</span> Admin</div>
    <button class="btn-logout" onclick="adminLogout()">Logout</button>
  </div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card"><div class="sc-label">Total Users</div><div class="sc-val" style="color:var(--primary2)" id="statUsers">0</div></div>
    <div class="stat-card"><div class="sc-label">Active Users</div><div class="sc-val" style="color:var(--green)" id="statActive">0</div></div>
    <div class="stat-card"><div class="sc-label">Total Bets</div><div class="sc-val" style="color:#3b82f6" id="statBets">0</div></div>
    <div class="stat-card"><div class="sc-label">Wins Paid</div><div class="sc-val" style="color:var(--gold)" id="statWins">₹0</div></div>
  </div>

  <!-- Force Result -->
  <div style="padding:0 14px 4px"><div style="font-size:14px;font-weight:700;color:#f1f0ff">🎯 Force Next Result</div><div style="font-size:11px;color:#6b7280;margin-top:2px">Set the number for the next draw</div></div>
  <div class="force-card">
    <div class="force-nums" id="forceNums">
      <button class="force-num" onclick="selectForce(0)">0</button>
      <button class="force-num" onclick="selectForce(1)">1</button>
      <button class="force-num" onclick="selectForce(2)">2</button>
      <button class="force-num" onclick="selectForce(3)">3</button>
      <button class="force-num" onclick="selectForce(4)">4</button>
      <button class="force-num" onclick="selectForce(5)">5</button>
      <button class="force-num" onclick="selectForce(6)">6</button>
      <button class="force-num" onclick="selectForce(7)">7</button>
      <button class="force-num" onclick="selectForce(8)">8</button>
      <button class="force-num" onclick="selectForce(9)">9</button>
    </div>
    <button class="force-btn" onclick="applyForce()">⚡ Set Forced Result</button>
    <button class="force-clear" onclick="clearForce()">✕ Clear</button>
    <div class="forced-status" id="forcedStatus"></div>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <input class="search-input" id="searchBox" oninput="filterUsers()" placeholder="🔍 Search users...">
  </div>

  <!-- Users -->
  <div class="users-list" id="usersList"><div class="no-users">Loading...</div></div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Edit User</div>
    <div class="modal-sub" id="editSub">@username</div>
    <div class="edit-row"><label class="form-label">Display Name</label><input class="form-input" id="editName"></div>
    <div class="edit-row"><label class="form-label">Balance (₹)</label><input class="form-input" type="number" id="editBalance"></div>
    <div class="edit-row">
      <label class="form-label">Add / Remove Coins</label>
      <div class="coins-row">
        <input class="form-input" type="number" id="editCoins" placeholder="Amount">
        <button class="btn-add"    onclick="adjustCoins(1)">+Add</button>
        <button class="btn-remove" onclick="adjustCoins(-1)">−Remove</button>
      </div>
    </div>
    <div class="edit-row"><label class="form-label">New Password <span style="font-weight:400;text-transform:none">(blank = no change)</span></label><input class="form-input" type="password" id="editPass" placeholder="New password"></div>
    <div class="modal-btns">
      <button class="btn-cancel"  onclick="closeEdit()">Cancel</button>
      <button class="btn-confirm" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script type="module">
  import {
    ADMIN_USER, ADMIN_PASS, ADMIN_SECRET,
    getAdminSession, setAdminSession, clearAdminSession,
    getAllUsers, updateUser, addTransaction,
    setForcedResult, clearForcedResult, getGameState
  } from './firebase-config.js';

  let allUsersData={}, editingKey=null, selectedForce=null;
  let wrongAttempts=0; const MAX_ATTEMPTS=5;

  // Check if already logged in
  if (getAdminSession()) {
    document.getElementById('lockScreen').style.display='none';
    document.getElementById('adminPanel').style.display='block';
    loadAllUsers();
    setInterval(loadAllUsers,8000);
    loadForcedStatus();
  }

  window.tryUnlock=function(){
    const u=document.getElementById('lockUser').value.trim().toLowerCase();
    const p=document.getElementById('lockPass').value;
    const s=document.getElementById('lockSecret').value;
    const err=document.getElementById('lockErr');

    if(wrongAttempts>=MAX_ATTEMPTS){
      err.textContent='Too many attempts. Refresh page.';
      return;
    }

    if(u===ADMIN_USER && p===ADMIN_PASS && s===ADMIN_SECRET){
      setAdminSession();
      document.getElementById('lockScreen').style.display='none';
      document.getElementById('adminPanel').style.display='block';
      loadAllUsers();
      setInterval(loadAllUsers,8000);
      loadForcedStatus();
    } else {
      wrongAttempts++;
      const left=MAX_ATTEMPTS-wrongAttempts;
      err.textContent='Invalid credentials';
      document.getElementById('attemptsLeft').textContent=left>0?`${left} attempts remaining`:'Account locked';
      // Clear fields
      document.getElementById('lockPass').value='';
      document.getElementById('lockSecret').value='';
    }
  };

  window.adminLogout=function(){clearAdminSession();window.location.reload();};

  async function loadAllUsers(){
    allUsersData=await getAllUsers();
    renderStats();
    filterUsers();
  }

  function renderStats(){
    const list=Object.values(allUsersData);
    document.getElementById('statUsers').textContent =list.length;
    document.getElementById('statActive').textContent=list.filter(u=>!u.blocked).length;
    document.getElementById('statBets').textContent  =list.reduce((a,u)=>a+(u.bets||0),0);
    document.getElementById('statWins').textContent  ='₹'+list.reduce((a,u)=>a+(u.totalWins||0),0).toLocaleString('en-IN');
  }

  window.filterUsers=function(){
    const q=(document.getElementById('searchBox').value||'').toLowerCase();
    const el=document.getElementById('usersList');
    let html='';
    Object.entries(allUsersData).forEach(([key,usr])=>{
      if(q&&!key.includes(q)&&!(usr.name||'').toLowerCase().includes(q)&&!(usr.uid||'').toLowerCase().includes(q)) return;
      const blocked=usr.blocked||false;
      html+=`
      <div class="user-row ${blocked?'blocked':''}">
        <div class="ur-top">
          <div class="ur-avatar${blocked?' blocked':''}">${(usr.name||'?')[0].toUpperCase()}</div>
          <div style="flex:1">
            <div class="ur-name">${usr.name||key} ${blocked?'<span class="blocked-badge">BLOCKED</span>':''}</div>
            <div class="ur-meta">@${key} · ${usr.uid||'—'}</div>
            <div class="ur-meta" style="font-size:10px">Pass: ${usr.password} · Ref: ${usr.referralCode||'—'}</div>
          </div>
        </div>
        <div class="ur-stats">
          <div class="ur-stat"><div class="ur-stat-label">Balance</div><div class="ur-stat-val" style="color:var(--primary2)">₹${(usr.balance||0).toLocaleString('en-IN')}</div></div>
          <div class="ur-stat"><div class="ur-stat-label">Wins</div><div class="ur-stat-val" style="color:var(--green)">₹${(usr.totalWins||0).toLocaleString('en-IN')}</div></div>
          <div class="ur-stat"><div class="ur-stat-label">Bets</div><div class="ur-stat-val">${usr.bets||0}</div></div>
        </div>
        <div class="ur-btns">
          <button class="ur-btn ur-btn-edit" onclick="openEdit('${key}')">✏️ Edit</button>
          ${blocked
            ?`<button class="ur-btn ur-btn-unblock" onclick="toggleBlock('${key}',false)">✅ Unblock</button>`
            :`<button class="ur-btn ur-btn-block"   onclick="toggleBlock('${key}',true)">🚫 Block</button>`
          }
        </div>
      </div>`;
    });
    el.innerHTML=html||'<div class="no-users">No users found</div>';
  }

  window.toggleBlock=async function(key,block){
    await updateUser(key,{blocked:block});
    allUsersData[key].blocked=block;
    renderStats();filterUsers();
  };

  // Force result
  window.selectForce=function(n){
    selectedForce=n;
    document.querySelectorAll('.force-num').forEach((b,i)=>{
      b.classList.toggle('selected',i===n);
    });
  };
  window.applyForce=async function(){
    if(selectedForce===null){alert('Select a number first');return;}
    await setForcedResult(selectedForce);
    document.getElementById('forcedStatus').textContent=`✅ Forced: Number ${selectedForce} will appear next draw`;
  };
  window.clearForce=async function(){
    await clearForcedResult();
    selectedForce=null;
    document.querySelectorAll('.force-num').forEach(b=>b.classList.remove('selected'));
    document.getElementById('forcedStatus').textContent='Cleared — next result will be random';
  };
  async function loadForcedStatus(){
    const s=await getGameState();
    if(s.forcedResult!==null&&s.forcedResult!==undefined){
      document.getElementById('forcedStatus').textContent=`⚡ Active: Number ${s.forcedResult} is forced`;
    }
  }

  // Edit modal
  window.openEdit=function(key){
    const usr=allUsersData[key];if(!usr)return;
    editingKey=key;
    document.getElementById('editSub').textContent   =`@${key}  (${usr.uid||'—'})`;
    document.getElementById('editName').value        =usr.name||'';
    document.getElementById('editBalance').value     =usr.balance||0;
    document.getElementById('editCoins').value       ='';
    document.getElementById('editPass').value        ='';
    document.getElementById('editModal').classList.add('show');
  };
  window.closeEdit=function(){document.getElementById('editModal').classList.remove('show');editingKey=null;};

  window.adjustCoins=async function(sign){
    const amt=parseInt(document.getElementById('editCoins').value);
    if(!amt||amt<1){alert('Enter valid amount');return;}
    const newBal=Math.max(0,(allUsersData[editingKey].balance||0)+(sign*amt));
    allUsersData[editingKey].balance=newBal;
    document.getElementById('editBalance').value=newBal;
    document.getElementById('editCoins').value='';
    await updateUser(editingKey,{balance:newBal});
    await addTransaction(editingKey,{type:sign>0?'deposit':'withdraw',amount:amt,desc:sign>0?'Admin added coins':'Admin removed coins',time:Date.now()});
    alert((sign>0?'✅ Added ':'✅ Removed ')+'₹'+amt.toLocaleString('en-IN'));
  };

  window.saveEdit=async function(){
    const newName=document.getElementById('editName').value.trim();
    const newBal =parseInt(document.getElementById('editBalance').value);
    const newPass=document.getElementById('editPass').value;
    if(!newName)                {alert('Name cannot be empty');return;}
    if(isNaN(newBal)||newBal<0) {alert('Enter valid balance');return;}
    if(newPass.length>0&&newPass.length<6){alert('Password min 6 chars');return;}
    const updates={name:newName,balance:newBal};
    if(newPass.length>=6) updates.password=newPass;
    await updateUser(editingKey,updates);
    allUsersData[editingKey]={...allUsersData[editingKey],...updates};
    window.closeEdit();filterUsers();renderStats();
    alert('✅ User updated!');
  };
</script>
</body>
</html>
