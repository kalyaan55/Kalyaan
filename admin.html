<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalyaan — Admin Panel</title>
<link rel="stylesheet" href="style.css">
<style>
  body { background:#0f0f1a; padding-bottom:30px; min-height:100vh; }
  .admin-header { background:#1a1a2e; border-bottom:1px solid #2d2d4e; padding:13px 16px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .admin-logo   { font-size:18px; font-weight:900; color:#fff; }
  .admin-logo span { background:linear-gradient(135deg,var(--primary),var(--gold)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .btn-logout   { background:#ef4444; border:none; border-radius:8px; color:#fff; font-family:'Poppins',sans-serif; font-size:12px; font-weight:600; padding:8px 16px; cursor:pointer; }

  .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:14px; }
  .stat-card  { background:#1a1a2e; border-radius:12px; border:1px solid #2d2d4e; padding:14px; }
  .sc-label   { font-size:10px; color:#6b7280; font-weight:600; text-transform:uppercase; }
  .sc-val     { font-size:22px; font-weight:800; margin-top:4px; }

  .search-wrap  { padding:0 14px 10px; }
  .search-input { width:100%; border:1.5px solid #2d2d4e; border-radius:10px; padding:10px 13px; font-family:'Poppins',sans-serif; font-size:14px; outline:none; background:#1a1a2e; color:#fff; }
  .search-input::placeholder { color:#4b5563; }
  .search-input:focus { border-color:var(--primary); }

  .users-list { padding:0 14px; }
  .user-row   { background:#1a1a2e; border:1px solid #2d2d4e; border-radius:12px; padding:14px; margin-bottom:10px; }
  .user-row.blocked { background:#1f0a0a; border-color:#7f1d1d; }
  .ur-name    { color:#fff; }
  .ur-meta    { color:#6b7280 !important; }
  .ur-stat    { background:#0f0f1a; }
  .ur-stat-label { color:#6b7280; }
  .ur-stat-val   { color:#e5e7eb; }

  .edit-row { margin-bottom:12px; }
  .edit-row .form-input { margin-bottom:0; }
  .coins-row { display:flex; gap:8px; }
  .coins-row .form-input { flex:1; margin-bottom:0; }
  .btn-add    { background:#10b981; border:none; border-radius:8px; color:#fff; font-family:'Poppins',sans-serif; font-size:12px; font-weight:700; padding:0 14px; cursor:pointer; white-space:nowrap; }
  .btn-remove { background:#ef4444; border:none; border-radius:8px; color:#fff; font-family:'Poppins',sans-serif; font-size:12px; font-weight:700; padding:0 14px; cursor:pointer; white-space:nowrap; }
  .no-users   { text-align:center; color:#6b7280; padding:30px; font-size:13px; }
</style>
</head>
<body>

<div class="admin-header">
  <div class="admin-logo">⚙️ <span>Kalyaan</span> Admin</div>
  <button class="btn-logout" onclick="adminLogout()">Logout</button>
</div>

<div class="stats-grid">
  <div class="stat-card"><div class="sc-label">Total Users</div><div class="sc-val" style="color:var(--primary)" id="statUsers">0</div></div>
  <div class="stat-card"><div class="sc-label">Active Users</div><div class="sc-val" style="color:var(--green)" id="statActive">0</div></div>
  <div class="stat-card"><div class="sc-label">Total Bets</div><div class="sc-val" style="color:#3b82f6" id="statBets">0</div></div>
  <div class="stat-card"><div class="sc-label">Total Wins Paid</div><div class="sc-val" style="color:var(--gold)" id="statWins">₹0</div></div>
</div>

<div class="search-wrap">
  <input class="search-input" id="searchBox" oninput="filterUsers()" placeholder="🔍 Search by name, username or ID...">
</div>

<div class="users-list" id="usersList"><div class="no-users">Loading users...</div></div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Edit User</div>
    <div class="modal-sub" id="editSub">@username</div>
    <div class="edit-row"><label class="form-label">Display Name</label><input class="form-input" id="editName"></div>
    <div class="edit-row"><label class="form-label">Balance (₹)</label><input class="form-input" type="number" id="editBalance"></div>
    <div class="edit-row">
      <label class="form-label">Add / Remove Coins</label>
      <div class="coins-row">
        <input class="form-input" type="number" id="editCoins" placeholder="Amount">
        <button class="btn-add"    onclick="adjustCoins(1)">+Add</button>
        <button class="btn-remove" onclick="adjustCoins(-1)">−Remove</button>
      </div>
    </div>
    <div class="edit-row"><label class="form-label">New Password <span style="font-weight:400;text-transform:none">(blank = no change)</span></label><input class="form-input" type="password" id="editPass" placeholder="New password"></div>
    <div class="modal-btns">
      <button class="btn-cancel"  onclick="closeEdit()">Cancel</button>
      <button class="btn-confirm" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script type="module">
  import {
    getAdminSession, clearAdminSession,
    getAllUsers, updateUser, addTransaction
  } from './firebase-config.js';

  let allUsersData = {};
  let editingKey   = null;

  window.addEventListener('load', async () => {
    if (!getAdminSession()) { window.location.href='index.html'; return; }
    await loadAllUsers();
    setInterval(loadAllUsers, 8000);
  });

  window.adminLogout = function() { clearAdminSession(); window.location.href='index.html'; };

  async function loadAllUsers() {
    allUsersData = await getAllUsers();
    renderStats();
    filterUsers();
  }

  function renderStats() {
    const list = Object.values(allUsersData);
    document.getElementById('statUsers').textContent  = list.length;
    document.getElementById('statActive').textContent = list.filter(u=>!u.blocked).length;
    document.getElementById('statBets').textContent   = list.reduce((a,u)=>a+(u.bets||0),0);
    document.getElementById('statWins').textContent   = '₹'+list.reduce((a,u)=>a+(u.totalWins||0),0).toLocaleString('en-IN');
  }

  window.filterUsers = function() {
    const q  = (document.getElementById('searchBox').value||'').toLowerCase();
    const el = document.getElementById('usersList');
    let html = '';

    Object.entries(allUsersData).forEach(([key,usr]) => {
      if (q && !key.includes(q) && !(usr.name||'').toLowerCase().includes(q) && !(usr.uid||'').toLowerCase().includes(q)) return;
      const blocked = usr.blocked||false;
      html += `
      <div class="user-row ${blocked?'blocked':''}">
        <div class="ur-top">
          <div class="ur-avatar${blocked?' blocked':''}">${(usr.name||'?')[0].toUpperCase()}</div>
          <div style="flex:1">
            <div class="ur-name">${usr.name||key} ${blocked?'<span class="blocked-badge">BLOCKED</span>':''}</div>
            <div class="ur-meta">@${key} · ${usr.uid||'—'}</div>
            <div class="ur-meta" style="font-size:10px;color:#4b5563">Pass: ${usr.password} · Ref: ${usr.referralCode||'—'}</div>
          </div>
        </div>
        <div class="ur-stats">
          <div class="ur-stat"><div class="ur-stat-label">Balance</div><div class="ur-stat-val" style="color:var(--primary)">₹${(usr.balance||0).toLocaleString('en-IN')}</div></div>
          <div class="ur-stat"><div class="ur-stat-label">Total Wins</div><div class="ur-stat-val" style="color:var(--green)">₹${(usr.totalWins||0).toLocaleString('en-IN')}</div></div>
          <div class="ur-stat"><div class="ur-stat-label">Bets</div><div class="ur-stat-val">${usr.bets||0}</div></div>
        </div>
        <div class="ur-btns">
          <button class="ur-btn ur-btn-edit" onclick="openEdit('${key}')">✏️ Edit</button>
          ${blocked
            ?`<button class="ur-btn ur-btn-unblock" onclick="toggleBlock('${key}',false)">✅ Unblock</button>`
            :`<button class="ur-btn ur-btn-block"   onclick="toggleBlock('${key}',true)">🚫 Block</button>`
          }
        </div>
      </div>`;
    });

    el.innerHTML = html || '<div class="no-users">No users found</div>';
  }

  window.toggleBlock = async function(key, block) {
    await updateUser(key, {blocked:block});
    allUsersData[key].blocked = block;
    renderStats(); filterUsers();
  };

  window.openEdit = function(key) {
    const usr = allUsersData[key]; if(!usr) return;
    editingKey = key;
    document.getElementById('editSub').textContent   = `@${key}  (${usr.uid||'—'})`;
    document.getElementById('editName').value        = usr.name||'';
    document.getElementById('editBalance').value     = usr.balance||0;
    document.getElementById('editCoins').value       = '';
    document.getElementById('editPass').value        = '';
    document.getElementById('editModal').classList.add('show');
  };
  window.closeEdit = function() { document.getElementById('editModal').classList.remove('show'); editingKey=null; };

  window.adjustCoins = async function(sign) {
    const amt = parseInt(document.getElementById('editCoins').value);
    if (!amt||amt<1) { alert('Enter valid amount'); return; }
    const newBal = Math.max(0,(allUsersData[editingKey].balance||0)+(sign*amt));
    allUsersData[editingKey].balance = newBal;
    document.getElementById('editBalance').value = newBal;
    document.getElementById('editCoins').value   = '';
    await updateUser(editingKey, {balance:newBal});
    await addTransaction(editingKey, {
      type: sign>0 ? 'deposit' : 'withdraw',
      amount: amt,
      desc: sign>0 ? 'Admin added coins' : 'Admin removed coins',
      time: Date.now()
    });
    alert((sign>0?'✅ Added ':'✅ Removed ')+'₹'+amt.toLocaleString('en-IN'));
  };

  window.saveEdit = async function() {
    const newName = document.getElementById('editName').value.trim();
    const newBal  = parseInt(document.getElementById('editBalance').value);
    const newPass = document.getElementById('editPass').value;
    if (!newName)                  { alert('Name cannot be empty'); return; }
    if (isNaN(newBal)||newBal<0)   { alert('Enter valid balance'); return; }
    if (newPass.length>0&&newPass.length<6) { alert('Password min 6 chars'); return; }
    const updates = {name:newName, balance:newBal};
    if (newPass.length>=6) updates.password=newPass;
    await updateUser(editingKey, updates);
    allUsersData[editingKey] = {...allUsersData[editingKey], ...updates};
    window.closeEdit(); filterUsers(); renderStats();
    alert('✅ User updated successfully!');
  };
</script>
</body>
</html>
